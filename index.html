<!DOCTYPE html>
<html>
<head>
<title>ClassTube</title>
<style>
body { margin:0; font-family:Arial, sans-serif; background:#fff; }

.avatar {
    width:30px; height:30px; border-radius:50%;
    color:white; display:flex; justify-content:center; align-items:center;
    font-weight:bold; font-family:Arial,sans-serif;
    cursor:pointer;
}
.videoTitle { cursor:pointer; color:blue; font-weight:500; margin:3px 0; }
.videoGrid { display:grid; grid-template-columns:repeat(5, 1fr); gap:15px; }
.videoCard { cursor:pointer; }
.videoCard iframe { width:100%; height:100px; }
#videoPlayerWrapper { display:flex; gap:20px; }
#otherVideos { flex:1; display:flex; flex-direction:column; gap:10px; overflow-y:auto; padding-top:5px; }
#otherVideos iframe { width:100%; height:90px; }
</style>
</head>

<body>

<table width="100%" border="1">
<tr>
<td>
<b>ClassTube</b>
<span id="headerLinks" style="float:right; display:none;">
<a href="#" id="homeBtn">Home</a> |
<a href="#" id="myProfileBtn">My Profile</a> |
<a href="#" id="logoutBtn">Logout</a>
</span>
</td>
</tr>
</table>

<!-- LOGIN -->
<div id="loginSection" style="width:300px; margin:50px auto; background:#DDD; padding:10px; border:1px solid #999;">
<h2>Login / Sign Up</h2>

<b>Sign Up</b><br><br>
Username:<br><input type="text" id="signupUsername"><br><br>
Email:<br><input type="email" id="signupEmail"><br><br>
Password:<br><input type="password" id="signupPassword"><br><br>
<input type="button" value="Create Account" id="signupBtn"><br><br>

<b>Login</b><br><br>
Email:<br><input type="email" id="loginEmail"><br><br>
Password:<br><input type="password" id="loginPassword"><br><br>
<input type="button" value="Login" id="loginBtn"><br><br>
</div>

<!-- FEED -->
<div id="feedSection" style="display:none; padding:20px;">
<h3>Students:</h3>
<div id="userList"></div>

<h3>All Videos:</h3>
<div id="homeThumbnails" class="videoGrid"></div>
</div>

<!-- CHANNEL -->
<div id="channelSection" style="display:none; padding:20px;">
<h2 id="channelTitle"></h2>
<div id="channelBio" style="margin-bottom:20px;"></div>
<h3>Videos</h3>
<div id="channelVideos" class="videoGrid"></div>
</div>

<!-- PROFILE -->
<div id="profileSection" style="display:none; padding:20px;">
Username: <b id="profileUsername"></b><br>
Join date: <span id="profileJoinDate"></span><br><br>
Bio:<br>
<textarea id="bio" rows="5" cols="40"></textarea><br>
<input type="button" value="Save Bio" id="saveBioBtn"><br><br>

<h3>My Videos</h3>
<div id="userVideos"></div>

<h3>Upload Video</h3>
Title:<br><input type="text" id="videoTitle"><br>
Video URL:<br><input type="text" id="videoURL"><br>
<input type="button" value="Post Video" id="postVideoBtn"><br>
</div>

<!-- VIDEO PLAYER -->
<div id="videoPlayerSection" style="display:none; padding:20px;">
<div id="videoPlayerWrapper">
<div id="videoPlayerMain" style="flex:2;">
<h3 id="playerTitle" class="videoTitle"></h3>
<div id="playerUploader" style="display:flex; align-items:center; gap:8px;"></div>
<iframe id="playerIframe" width="560" height="315" src="" frameborder="0" allowfullscreen></iframe>
</div>
<div id="otherVideos" style="flex:1;"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, getDocs, addDoc, query, orderBy, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyC2QdW6Gq3dnFf2JL4-vET-68M6LvTJUvw",
  authDomain:"classtube2-1436a.firebaseapp.com",
  projectId:"classtube2-1436a",
  storageBucket:"classtube2-1436a.firebasestorage.app",
  messagingSenderId:"290016676161",
  appId:"1:290016676161:web:1f88361dcb31ad31fd79c0"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let currentUser = null;

// --- Avatar colors per username (public, random per session) ---
const avatarColors = ["#AA47BD","#7B1FA2","#0388D2","#0098A7","#68A039","#EF6C00","#EC417A","#5D6AC0","#004D40","#34691E","#8C6E63","#512DA7"];
const avatarColorMap = {}; // username -> color
function getAvatarColor(username){
  if(avatarColorMap[username]) return avatarColorMap[username];
  const color = avatarColors[Math.floor(Math.random()*avatarColors.length)];
  avatarColorMap[username] = color;
  return color;
}

// --- Show Sections ---
function showSection(section){
  document.getElementById("loginSection").style.display = (section==="login")?"block":"none";
  document.getElementById("feedSection").style.display = (section==="feed")?"block":"none";
  document.getElementById("profileSection").style.display = (section==="profile")?"block":"none";
  document.getElementById("videoPlayerSection").style.display = (section==="player")?"block":"none";
  document.getElementById("channelSection").style.display = (section==="channel")?"block":"none";
}

// --- Signup ---
signupBtn.onclick = async ()=>{
  const username = signupUsername.value.trim();
  const email = signupEmail.value.trim();
  const password = signupPassword.value;
  if(!username){ alert("Username required"); return; }
  const userCred = await createUserWithEmailAndPassword(auth,email,password);
  await setDoc(doc(db,"users",userCred.user.uid),{ username,email,bio:"",createdAt:new Date() });
  signupUsername.value=""; signupEmail.value=""; signupPassword.value="";
  showSection("feed"); currentUser = userCred.user;
  loadUsers(); loadVideos();
};

// --- Login ---
loginBtn.onclick = async ()=>{
  const email = loginEmail.value.trim();
  const password = loginPassword.value;
  await signInWithEmailAndPassword(auth,email,password);
};

// --- Auth State ---
onAuthStateChanged(auth, async (user)=>{
  if(!user){ showSection("login"); return; }
  currentUser = user;
  showSection("feed");
  loadUsers(); loadVideos(); loadUserVideos();
});

// --- Load Users ---
async function loadUsers(){
  const snapshot = await getDocs(collection(db,"users"));
  let html="<table border='1' cellpadding='5'><tr><th>Avatar</th><th>Username</th><th>Bio</th></tr>";
  snapshot.forEach(doc=>{
    const data = doc.data();
    const firstLetter = data.username.charAt(0);
    const color = getAvatarColor(data.username);
    html+=`<tr>
      <td><div class='avatar' style='background:${color}' onclick="openChannel('${doc.id}','${data.username}')">${firstLetter}</div></td>
      <td onclick="openChannel('${doc.id}','${data.username}')">${data.username}</td>
      <td>${data.bio||""}</td>
    </tr>`;
  });
  html+="</table>"; document.getElementById('userList').innerHTML = html;
}

// --- Load Videos ---
async function loadVideos(){
  const q=query(collection(db,"videos"),orderBy("createdAt","desc"));
  const snapshot = await getDocs(q);
  let html="";
  snapshot.forEach(doc=>{
    const data = doc.data();
    html+=`<div class="videoCard" onclick="playVideo('${doc.id}')">
      <iframe src="${data.url.replace("/view","/preview")}" frameborder="0"></iframe>
      <div class="videoTitle">${data.title}</div>
    </div>`;
  });
  document.getElementById('homeThumbnails').innerHTML = html;
}

// --- Open Channel ---
window.openChannel = async (uid, username)=>{
  showSection("channel");
  document.getElementById('channelTitle').innerText = username+"'s channel";
  const userSnap = await getDoc(doc(db,"users",uid));
  document.getElementById('channelBio').innerText = userSnap.data().bio || "";
  const snapshot = await getDocs(collection(db,"videos"));
  let html="";
  snapshot.forEach(doc=>{
    const d = doc.data();
    if(d.userId === uid){
      html+=`<div class="videoCard" onclick="playVideo('${doc.id}')">
        <iframe src="${d.url.replace("/view","/preview")}" frameborder="0"></iframe>
        <div class="videoTitle">${d.title}</div>
      </div>`;
    }
  });
  document.getElementById('channelVideos').innerHTML = html;
};

// --- Play Video ---
window.playVideo = async function(videoId){
  showSection("player");
  const docSnap = await getDoc(doc(db,"videos",videoId));
  const data = docSnap.data();
  document.getElementById('playerTitle').innerText = data.title;
  document.getElementById('playerIframe').src = data.url.replace("/view","/preview");
  const uploaderSnap = await getDoc(doc(db,"users",data.userId));
  const user = uploaderSnap.data();
  const color = getAvatarColor(user.username);
  document.getElementById('playerUploader').innerHTML = `<div class='avatar' style='background:${color}' onclick="openChannel('${data.userId}','${user.username}')">${user.username.charAt(0)}</div><span onclick="openChannel('${data.userId}','${user.username}')">${user.username}</span>`;
  
  // Random sidebar
  const snapshot = await getDocs(collection(db,"videos"));
  let vids=[];
  snapshot.forEach(d=>{
    if(d.id!==videoId) vids.push({id:d.id,data:d.data()});
  });
  vids.sort(()=>Math.random()-0.5);
  let html="";
  vids.slice(0,6).forEach(v=>{
    html+=`<div onclick="playVideo('${v.id}')">
      <iframe src="${v.data.url.replace("/view","/preview")}" frameborder="0"></iframe>
      <div class="videoTitle">${v.data.title}</div>
    </div>`;
  });
  document.getElementById('otherVideos').innerHTML = html;
};

// --- Upload Video ---
postVideoBtn.onclick = async ()=>{
  const title = videoTitle.value.trim();
  const url = videoURL.value.trim();
  await addDoc(collection(db,"videos"),{ title,url,userId:currentUser.uid,createdAt:new Date() });
  videoTitle.value=""; videoURL.value="";
  loadVideos();
};

// --- Save Bio ---
saveBioBtn.onclick = async () => {
  const bioText = document.getElementById('bio').value.trim();
  await updateDoc(doc(db,"users",currentUser.uid),{ bio: bioText });
};

// --- Navigation ---
homeBtn.onclick = ()=>{ showSection("feed"); loadUsers(); loadVideos(); };
myProfileBtn.onclick = ()=>showSection("profile");
logoutBtn.onclick = async ()=>await signOut(auth);

// --- Load User Videos ---
async function loadUserVideos(){
  const q=query(collection(db,"videos"),orderBy("createdAt","desc"));
  const snapshot = await getDocs(q);
  let html="";
  snapshot.forEach(doc=>{
    const data = doc.data();
    if(data.userId===currentUser.uid){
      html+=`<div class="videoTitle" onclick="playVideo('${doc.id}')">${data.title}</div>`;
    }
  });
  document.getElementById('userVideos').innerHTML = html;
}

// --- Initial ---
showSection("login");
</script>
</body>
</html>
