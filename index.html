<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, getDocs, addDoc, query, orderBy, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyC2QdW6Gq3dnFf2JL4-vET-68M6LvTJUvw",
  authDomain:"classtube2-1436a.firebaseapp.com",
  projectId:"classtube2-1436a",
  storageBucket:"classtube2-1436a.firebasestorage.app",
  messagingSenderId:"290016676161",
  appId:"1:290016676161:web:1f88361dcb31ad31fd79c0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;


// SHOW SECTIONS
function showSection(section){
  document.getElementById("loginSection").style.display = (section==="login")?"block":"none";
  document.getElementById("feedSection").style.display = (section==="feed")?"block":"none";
  document.getElementById("profileSection").style.display = (section==="profile")?"block":"none";
}


// HEADER
document.getElementById("homeBtn").onclick = ()=>showSection('feed');
document.getElementById("myProfileBtn").onclick = ()=>loadProfile();
document.getElementById("logoutBtn").onclick = async ()=>{ await signOut(auth); };


// SIGNUP
document.getElementById('signupBtn').onclick = async ()=>{

  const username = document.getElementById('signupUsername').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;

  try{

    const userCred = await createUserWithEmailAndPassword(auth,email,password);

    await setDoc(doc(db,"users",userCred.user.uid),{
      username,
      email,
      bio:"",
      createdAt:new Date()
    });

    document.getElementById('signupUsername').value="";
    document.getElementById('signupEmail').value="";
    document.getElementById('signupPassword').value="";

    status.innerText="Account created!";

  }catch(err){
    status.innerText=err.message;
  }

};


// LOGIN
document.getElementById('loginBtn').onclick = async ()=>{

  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  try{
    await signInWithEmailAndPassword(auth,email,password);
  }catch(err){
    status.innerText=err.message;
  }

};


// AUTH STATE
const status = document.getElementById('status');
const headerLinks = document.getElementById('headerLinks');
const userEmail = document.getElementById('userEmail');

onAuthStateChanged(auth, async (user)=>{

  if(!user){

    showSection("login");
    headerLinks.style.display="none";
    status.innerText="You must log in.";

  }else{

    currentUser=user;

    showSection("feed");
    headerLinks.style.display="inline";
    userEmail.innerText=user.email;

    const userSnap = await getDoc(doc(db,"users",user.uid));

    if(userSnap.exists()){
      currentUser.username=userSnap.data().username;
    }

    await loadUsers();
    await loadVideos();
    await loadProfile();
    await loadUserVideos();

  }

});


// LOAD USERS
async function loadUsers(){

  const snapshot = await getDocs(collection(db,"users"));

  let html="<table border='1' cellpadding='5'><tr><th>Username</th><th>Bio</th></tr>";

  snapshot.forEach(docSnap=>{

    const data = docSnap.data();

    html+=`
    <tr>
      <td>${data.username}</td>
      <td>${data.bio || ""}</td>
    </tr>
    `;

  });

  html+="</table>";

  document.getElementById('userList').innerHTML=html;

}


// LOAD VIDEOS
async function loadVideos(){

  const q=query(collection(db,"videos"),orderBy("createdAt","desc"));
  const snapshot = await getDocs(q);

  let html="<table border='1' cellpadding='5'><tr><th>Title</th><th>Video</th><th>Uploader</th><th>Views</th></tr>";

  snapshot.forEach(docSnap=>{

    const data = docSnap.data();
    const videoId = docSnap.id;

    let fileId = "";

    if(data.url.includes("/d/")){
      fileId = data.url.split("/d/")[1].split("/")[0];
    }

    const previewURL = `https://drive.google.com/file/d/${fileId}/preview`;

    html+=`
    <tr>
      <td>${data.title}</td>

      <td>
        <iframe
        src="${previewURL}"
        width="240"
        height="135"
        allow="autoplay"
        onclick="incrementView('${videoId}')">
        </iframe>
      </td>

      <td>${data.user}</td>

      <td>${data.views || 0}</td>
    </tr>
    `;

  });

  html+="</table>";

  document.getElementById('videoList').innerHTML=html;

}


// INCREMENT VIEWS
window.incrementView = async function(videoId){

  const videoRef = doc(db,"videos",videoId);

  await updateDoc(videoRef,{
    views: increment(1)
  });

  await loadVideos();

}


// UPLOAD VIDEO
document.getElementById('postVideoBtn').onclick = async ()=>{

  const title = document.getElementById('videoTitle').value.trim();
  const url = document.getElementById('videoURL').value.trim();

  if(!title || !url){
    alert("Title and URL are required!");
    return;
  }

  await addDoc(collection(db,"videos"),{

    title,
    url,
    user: currentUser.username,
    userId: currentUser.uid,
    createdAt:new Date(),
    views:0

  });

  document.getElementById('videoTitle').value="";
  document.getElementById('videoURL').value="";

  await loadVideos();

  alert("Video uploaded!");

}


// PROFILE
async function loadProfile(){

  showSection('profile');

  const docSnap = await getDoc(doc(db,"users",currentUser.uid));

  if(docSnap.exists()){

    document.getElementById('profileUsername').innerText = docSnap.data().username;

    const created = docSnap.data().createdAt;

    if(created?.toDate){
      document.getElementById('profileJoinDate').innerText = created.toDate().toDateString();
    }

    document.getElementById('bio').value = docSnap.data().bio || "";

  }

}


// SAVE BIO
document.getElementById('saveBioBtn').onclick = async ()=>{

  const bio = document.getElementById('bio').value.trim();

  try{

    await updateDoc(doc(db,"users",currentUser.uid),{
      bio: bio
    });

    document.getElementById('profileStatus').innerText = "Bio saved!";

  }catch(err){

    document.getElementById('profileStatus').innerText = "Error: "+err.message;

  }

}


// USER VIDEOS
async function loadUserVideos(){

  const q=query(collection(db,"videos"),orderBy("createdAt","desc"));
  const snapshot = await getDocs(q);

  let html="";

  snapshot.forEach(docSnap=>{

    const data=docSnap.data();

    if(data.user===currentUser.username){

      html+=`
      <div>
      ${data.title} -
      <a href="${data.url}" target="_blank">Watch</a>
      </div>
      `;

    }

  });

  document.getElementById('userVideos').innerHTML=html;

}


// INITIAL
showSection("login");

</script>
