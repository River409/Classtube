<!DOCTYPE html>
<html>
<head>
<title>Classtube</title>
<style>
.avatar {
    width: 30px;
    height: 30px;
    border-radius: 2px;
    border: 1px solid #888;
    background-size: cover;
    background-position: center;
    display: inline-block;
}
#headerLinks a {
    font-size: 17px;
    font-weight: bold;
    margin-right: 12px;
}
#watermark {
    position: absolute;
    top: 8px;
    left: 10px;
    width: 120px;
    opacity: 0.75;
    pointer-events: none;
}
/* =========================
   GENERAL
========================= */
body {
    margin: 0;
    font-family: Verdana, sans-serif;
    background: #f1f1f1;
    color: #333;
}
/* =========================
   HEADER
========================= */
#headerTable {
    width: 100%;
    border: none;
    background: linear-gradient(#f8f8f8, #e6e6e6);
    border-bottom: 1px solid #ccc;
    padding: 6px 10px;
}
#logoImg {
    height: 60px;
    vertical-align: middle;
}
#headerLinks a {
    color: #0066cc;
    text-decoration: none;
    font-size: 13px;
    margin-right: 10px;
}
#headerLinks a:hover {
    text-decoration: underline;
}
button, input[type="button"] {
    font-size: 12px;
    padding: 5px 10px;
    border: 1px solid #999;
    border-radius: 3px;
    background: linear-gradient(#ffffff, #dddddd);
    cursor: pointer;
}
button:hover, input[type="button"]:hover {
    background: linear-gradient(#ffffff, #eeeeee);
}
input, textarea {
    border: 1px solid #aaa;
    padding: 5px;
    font-size: 12px;
    border-radius: 2px;
    background: #fff;
}
/* =========================
   VIDEO GRID
========================= */
#homeThumbnails {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}
#homeThumbnails div {
    width: 160px;
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
    cursor: pointer;
}
#homeThumbnails iframe {
    border-radius: 3px;
}
/* Titles */
.videoTitle {
    font-size: 13px;
    font-weight: bold;
    color: #0066cc;
    margin-top: 4px;
}
.videoTitle:hover {
    text-decoration: underline;
}
/* =========================
   VIDEO PLAYER
========================= */
#videoPlayerWrapper {
    display: flex;
    gap: 20px;
}
#videoPlayerMain iframe {
    border-radius: 4px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
#headerLinks {
    margin-top: 10px;
}
#headerLinks a {
    display: inline-block;
    padding: 6px 14px;
    margin: 0 5px;
    background: linear-gradient(#6dbf4b, #4e9e32);
    color: white;
    font-weight: bold;
    text-decoration: none;
    border: 1px solid #3e7f28;
    border-radius: 3px;
    font-size: 13px;
}
/* Sidebar */
#otherVideos {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
#otherVideos div {
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 3px;
    padding: 4px;
    cursor: pointer;
}
/* =========================
   USER TABLE
========================= */
#userList table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}
#userList th {
    background: #eaeaea;
    border: 1px solid #ccc;
    padding: 6px;
}
#userList td {
    border: 1px solid #ccc;
    padding: 8px;
}
#userList tr:hover {
    background: #f5f5f5;
}
/* =========================
   PROFILE
========================= */
#profileSection {
    background: #fff;
    padding: 15px;
    border: 1px solid #ccc;
    border-radius: 4px;
}
/* =========================
   SEARCH BAR
========================= */
#searchInput {
    width: 50%;
    padding: 6px;
    border: 1px solid #aaa;
    border-radius: 3px;
}
/* =========================
   FOOTER
========================= */
#footer {
    margin-top: 40px;
    padding: 12px;
    text-align: center;
    background: #e6e6e6;
    border-top: 1px solid #ccc;
    font-size: 12px;
}
#footer a {
    color: #0066cc;
    text-decoration: none;
}
#footer a:hover {
    text-decoration: underline;
}
.videoTitle { cursor:pointer; color:blue; font-weight:500; margin:3px 0; }
.videoMeta { color:grey; font-size:12px; margin-bottom:5px; }
#videoPlayerWrapper { display:flex; gap:20px; }
#videoPlayerMain { flex:2; }
#otherVideos { flex:1; display:flex; flex-direction:column; gap:10px; overflow-y:auto; padding-top:5px; }
#otherVideos div { cursor:pointer; display:flex; flex-direction:column; }
#homeThumbnails { display:flex; flex-wrap:wrap; gap:10px; padding-top:5px; margin-bottom:15px; }
#homeThumbnails div { cursor:pointer; display:flex; flex-direction:column; width:160px; }
#homeThumbnails iframe { width:160px; height:90px; border:1px solid #000; }
.channelHeader { font-weight:bold; margin-bottom:5px; cursor:pointer; color:blue; }
.channelBio { font-style:italic; margin-bottom:15px; }
.tabButtons { margin-bottom:10px; }
.tabButtons button { margin-right:5px; padding:5px 10px; cursor:pointer; border:2px outset #ccc; background:#ddd; font-weight:bold; }
button:active { border:2px inset #ccc; }
table { border:2px solid #000; background:#eee; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="userProfile" style="position:absolute; top:10px; right:15px; display:flex; align-items:center; gap:8px;">
<img id="userAvatar" src="" style="width:34px; height:34px; border-radius:0; border:1px solid #888; display:none;">
<span id="usernameDisplay" style="font-weight:500;"></span>
</div>

<table width="100%" border="0">
<tr>
<td>
<img id="logoImg" src="logo.png" style="height:65px;">
<div id="headerLinks" style="text-align:center; display:none;">
<a href="#" id="homeBtn">Home</a> |
<a href="#" id="myProfileBtn">Profile</a> |
<a href="#" id="logoutBtn">Logout</a>
</span>
</td>
</tr>
</table>

<!-- LOGIN -->
<div id="loginSection" style="width:300px; margin:50px auto; background:#DDD; padding:10px; border:1px solid #999;">
<h2>Login / Sign Up</h2>

<b>Sign Up</b><br><br>
Username:<br><input type="text" id="signupUsername"><br><br>
Email:<br><input type="email" id="signupEmail"><br><br>
Birthdate:<br><input type="date" id="signupBirthdate"><br><br>
Password:<br><input type="password" id="signupPassword"><br><br>
<input type="button" value="Create Account" id="signupBtn"><br><br>

<b>Login</b><br><br>
Email:<br><input type="email" id="loginEmail"><br><br>
Password:<br><input type="password" id="loginPassword"><br><br>
<input type="button" value="Login" id="loginBtn"><br><br>

<span id="status"></span>
</div>

<!-- FEED -->
<div id="feedSection" style="display:none; padding:20px;">
<h3>Welcome, <span id="userEmail"></span></h3>
<hr>

<div id="searchContainer" style="margin-bottom:15px;">
  <input type="text" id="searchInput" placeholder="Search videos or users..." style="width:50%; padding:5px;">
</div>

<div class="tabButtons">
  <button id="videosTab">Videos</button>
  <button id="peopleTab">People</button>
  <button id="messagesTab">Messages</button>
</div>

<div id="videosSection">
  <h3>All Videos:</h3>
  <div id="homeThumbnails"></div>
</div>

<div id="peopleSection" style="display:none;">
  <h3>Users:</h3>
  <div id="userList"></div>
</div>

<div id="messagesSection" style="display:none;">
  <h3>Inbox</h3>
  <div id="messageList" style="border:1px solid #ccc; max-height:300px; overflow-y:auto; padding:5px; background:#f9f9f9;"></div>

  <div id="messageView" style="display:none; border:1px solid #888; padding:10px; margin-top:10px; background:#fff; max-width:600px;">
    <div id="msgHeader" style="font-weight:bold; margin-bottom:5px;"></div>
    <div id="msgText" style="white-space:pre-wrap; margin-top:5px;"></div>
    <input type="text" id="replyInput" placeholder="Reply..." style="width:100%; margin-top:10px;">
    <button id="replyBtn" style="margin-top:5px;">Send Reply</button>
  </div>
</div>

<!-- PROFILE -->
<div id="profileSection" style="display:none; padding:20px;">
Username: <b id="profileUsername"></b><br>
Join date: <span id="profileJoinDate"></span><br><br>

<div id="bioContainer">
  Bio:<br>
  <textarea id="bio" rows="5" cols="40"></textarea><br>
</div>

<input type="button" value="Save Bio" id="saveBioBtn"><br>
<div id="profileStatus"></div><br><br>

<h3>Videos</h3>
<div id="userVideos"></div>

<div id="uploadSection">
Title:<br><input type="text" id="videoTitle"><br>
Description:<br><textarea id="videoDescription" rows="3" cols="40"></textarea><br>
Video URL:<br><input type="text" id="videoURL"><br>
<input type="button" value="Post Video" id="postVideoBtn"><br>
</div>
</div>

<!-- VIDEO PLAYER -->
<div id="videoPlayerSection" style="display:none; padding:20px;">
<div id="videoPlayerWrapper">
<div id="videoPlayerMain">
<h3 id="playerTitle" class="videoTitle"></h3>
<div id="playerUploader" style="display:flex; align-items:center; gap:8px;"></div>
<div style="position:relative; display:inline-block;">
  <iframe id="playerIframe" width="560" height="315" src="" frameborder="0" allowfullscreen></iframe>
  <img id="watermark" src="watermark.png">
</div>
<div id="playerStats" class="videoMeta"></div>
<div id="playerDescription" style="margin:10px 0; font-style:italic;"></div>
</div>
<div id="otherVideos"></div>
</div>
</div>

<!-- Firebase + Script -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, getDocs, addDoc, query, orderBy, getDoc, updateDoc, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyC2QdW6Gq3dnFf2JL4-vET-68M6LvTJUvw",
  authDomain:"classtube2-1436a.firebaseapp.com",
  projectId:"classtube2-1436a",
  storageBucket:"classtube2-1436a.firebasestorage.app",
  messagingSenderId:"290016676161",
  appId:"1:290016676161:web:1f88361dcb31ad31fd79c0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let currentUser = null;
let currentVideoId = null;

const defaultAvatar = "https://preview.redd.it/old-youtube-default-icons-v0-h68mdg17af661.png?width=250&format=png&auto=webp&s=0e7d4140dafde9e52ca6b36204ebb11bd822f3e9";
function createAvatar(name){
  const div = document.createElement("div");
  div.className="avatar";
  div.style.backgroundImage=`url('${defaultAvatar}')`;
  div.title=name;
  return div;
}

const status = document.getElementById('status');
const headerLinks = document.getElementById('headerLinks');
const userEmail = document.getElementById('userEmail');

function showSection(section){
  document.getElementById("loginSection").style.display = (section==="login")?"block":"none";
  document.getElementById("feedSection").style.display = (section==="feed")?"block":"none";
  document.getElementById("profileSection").style.display = (section==="profile")?"block":"none";
  document.getElementById("videoPlayerSection").style.display = (section==="player")?"block":"none";
}

// TABS
document.getElementById('videosTab').onclick = ()=>{ document.getElementById('videosSection').style.display="block"; document.getElementById('peopleSection').style.display="none"; document.getElementById('messagesSection').style.display="none"; };
document.getElementById('peopleTab').onclick = ()=>{ document.getElementById('videosSection').style.display="none"; document.getElementById('peopleSection').style.display="block"; document.getElementById('messagesSection').style.display="none"; };
document.getElementById('messagesTab').onclick = async ()=>{ document.getElementById('videosSection').style.display="none"; document.getElementById('peopleSection').style.display="none"; document.getElementById('messagesSection').style.display="block"; await loadMessagesInbox(); };

// AUTH STATE
onAuthStateChanged(auth, async user => {
  if(!user){ showSection("login"); headerLinks.style.display="none"; status.innerText="Please login."; return; }
  currentUser=user;
  showSection("feed");
  headerLinks.style.display="inline";
  userEmail.innerText=user.email;
  await loadUsers();
  await loadVideos();
  await loadProfile();
});

// SIGNUP/LOGIN/LOGOUT
document.getElementById('signupBtn').onclick=async ()=>{
  const username=document.getElementById('signupUsername').value.trim();
  const email=document.getElementById('signupEmail').value.trim();
  const password=document.getElementById('signupPassword').value;
  if(!username){ status.innerText="Username required"; return; }
  try{
    const userCred=await createUserWithEmailAndPassword(auth,email,password);
    await setDoc(doc(db,"users",userCred.user.uid),{username,email,bio:"",createdAt:new Date()});
    document.getElementById('signupUsername').value="";
    document.getElementById('signupEmail').value="";
    document.getElementById('signupPassword').value="";
    status.innerText="Account created!";
  }catch(err){ status.innerText=err.message; }
};
document.getElementById('loginBtn').onclick=async ()=>{
  const email=document.getElementById('loginEmail').value.trim();
  const password=document.getElementById('loginPassword').value;
  try{ await signInWithEmailAndPassword(auth,email,password); } catch(err){ status.innerText=err.message; }
};

const messagesRef = collection(db, "messages");

async function loadMessagesInbox() {
  if (!currentUser) return;

  const qSent = query(messagesRef, where("from", "==", currentUser.uid), orderBy("createdAt", "desc"));
  const qReceived = query(messagesRef, where("to", "==", currentUser.uid), orderBy("createdAt", "desc"));

  const sentSnap = await getDocs(qSent);
  const receivedSnap = await getDocs(qReceived);

  const messages = [];

  sentSnap.forEach(doc => { messages.push({ id: doc.id, ...doc.data(), type: 'sent' }); });
  receivedSnap.forEach(doc => { messages.push({ id: doc.id, ...doc.data(), type: 'received' }); });

  messages.sort((a,b) => b.createdAt.toDate ? b.createdAt.toDate() - a.createdAt.toDate() : b.createdAt.seconds - a.createdAt.seconds);

  let html = '<table border="1" cellpadding="5" width="100%"><tr style="background:#ddd;"><th>Type</th><th>From/To</th><th>Snippet</th></tr>';
  for (const msg of messages) {
    let usernameRef = '';
    if(msg.type==='sent') {
      const userDoc = await getDoc(doc(db,"users",msg.to));
      usernameRef = userDoc.exists()?userDoc.data().username:msg.to;
    } else {
      const userDoc = await getDoc(doc(db,"users",msg.from));
      usernameRef = userDoc.exists()?userDoc.data().username:msg.from;
    }
    const snippet = msg.text.length>30?msg.text.substring(0,30)+'...':msg.text;
    html += `<tr onclick="viewMessage('${msg.id}')"><td>${msg.type}</td><td>${usernameRef}</td><td>${snippet}</td></tr>`;
  }
  html += '</table>';
  document.getElementById('messageList').innerHTML=html;
}

window.viewMessage = async (msgId)=>{
  const msgDoc = await getDoc(doc(db,"messages",msgId));
  if(!msgDoc.exists()) return;
  const data = msgDoc.data();
  const fromUser = await getDoc(doc(db,"users",data.from));
  const toUser = await getDoc(doc(db,"users",data.to));
  document.getElementById('msgHeader').innerText = `From: ${fromUser.data().username}  To: ${toUser.data().username}`;
  document.getElementById('msgText').innerText = data.text;
  document.getElementById('messageView').style.display="block";
  document.getElementById('replyBtn').onclick = async ()=>{
    const replyText = document.getElementById('replyInput').value.trim();
    if(!replyText) return;
    await addDoc(messagesRef,{from:currentUser.uid,to:data.from,text:replyText,createdAt:new Date()});
    document.getElementById('replyInput').value="";
    alert("Reply sent!");
    await loadMessagesInbox();
  };
};
</script>
</body>
</html>
